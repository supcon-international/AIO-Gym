# Local MQTT broker for AIO-Gym.
#   docker compose -f deploy/docker-compose.yml up
# Browser «外部接口» -> ws://localhost:8083/mqtt   ·   Python agent -> localhost:1883
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aio-gym-broker
    ports:
      - "1883:1883"   # MQTT (TCP) — Python agents
      - "8083:8083"   # MQTT over WebSocket — browser
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
